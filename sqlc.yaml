version: "2"
sql:
  - schema: "migrations"
    queries: "internal/repo/persistent/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repo/persistent/sqlc"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"

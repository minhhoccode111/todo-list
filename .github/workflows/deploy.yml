name: Deploy Todo List

on:
  push:
    branches: [release]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add VPS to known hosts (with retry)
        run: |
          mkdir -p ~/.ssh
          for i in 1 2 3; do
            ssh-keyscan -T 10 -p ${{ secrets.SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts && break
            sleep 2
          done

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          NGINX_SITE_NAME: ${{ secrets.NGINX_SITE_NAME }}
          APP_NAME: ${{ secrets.APP_NAME }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Copy docker-compose.prod.yml and nginx config to VPS
          scp -P $SSH_PORT -i ~/.ssh/deploy_key docker-compose.prod.yml deploy@$VPS_HOST:/tmp/docker-compose-$APP_NAME.prod.yml
          scp -P $SSH_PORT -i ~/.ssh/deploy_key nginx/nginx-prod.conf deploy@$VPS_HOST:/tmp/nginx-prod-$APP_NAME.conf

          echo "$PROD_ENV_FILE" > /tmp/.env.$APP_NAME.prod
          scp -P $SSH_PORT -i ~/.ssh/deploy_key /tmp/.env.$APP_NAME.prod deploy@$VPS_HOST:/tmp/.env.$APP_NAME.prod
          rm -fr /tmp/.env.$APP_NAME.prod

          ssh -p $SSH_PORT -i ~/.ssh/deploy_key deploy@$VPS_HOST << EOF
            set -e

            # Create app directory and move compose file
            mkdir -p ~/$APP_NAME
            mv /tmp/docker-compose-$APP_NAME.prod.yml ~/$APP_NAME/docker-compose.yml
            mv /tmp/.env.$APP_NAME.prod ~/$APP_NAME/.env.prod

            # Change to app directory
            cd ~/$APP_NAME

            # In case db is not up first run
            docker compose --env-file .env.prod up db -d

            # Pull latest images
            docker compose --env-file .env.prod pull app

            # Stop and start services with docker-compose
            docker compose --env-file .env.prod up app -d --force-recreate

            # Cleanup
            docker system prune -f

            # Check if nginx config has changed and update if needed
            if ! cmp -s /tmp/nginx-prod-$APP_NAME.conf /etc/nginx/sites-available/$NGINX_SITE_NAME.conf; then
              sudo cp /tmp/nginx-prod-$APP_NAME.conf /etc/nginx/sites-available/$NGINX_SITE_NAME.conf
              sudo ln -sf /etc/nginx/sites-available/$NGINX_SITE_NAME.conf /etc/nginx/sites-enabled/$NGINX_SITE_NAME.conf
              # Reload nginx
              sudo nginx -t && sudo nginx -s reload
            fi
          EOF

          rm -f ~/.ssh/deploy_key

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Build
        working-directory: frontend
        env:
          PUBLIC_API_URL: https://todoapi.minhhoccode111.com/api/v1
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

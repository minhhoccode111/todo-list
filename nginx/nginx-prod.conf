# SSL Certificate Setup Instructions:
#
# 1. Install certbot:
#    sudo apt update && sudo apt install certbot python3-certbot-nginx
#
# 2. Create a temporary nginx config to get certificates (HTTP-01 challenge):
#    sudo -E vim /etc/nginx/sites-available/temp
#
#    server {
#        listen 80;
#        server_name todoapi.minhhoccode111.com;
#        location / {
#            return 200 "ACME challenge ready";
#        }
#    }
#
# 3. Enable and test the temporary config:
#    sudo ln -s /etc/nginx/sites-available/temp /etc/nginx/sites-enabled/temp
#    sudo nginx -t && sudo systemctl reload nginx
#
# 4. Obtain SSL certificate:
#    sudo certbot certonly --nginx -d todoapi.minhhoccode111.com
#
# 5. Setup auto-renewal:
#    sudo certbot renew --dry-run
#    # Certbot automatically sets up a cron job or systemd timer
#    sudo systemctl list-timers | grep certbot
#
# 6. After obtaining certs, replace temporary config with this full config:
#    sudo rm /etc/nginx/sites-enabled/temp
#    sudo cp nginx.conf /etc/nginx/nginx.conf (or add to sites-enabled)
#    sudo nginx -t && sudo systemctl reload nginx
#
# Certificate files will be located at:
# - /etc/letsencrypt/live/todoapi.minhhoccode111.com/fullchain.pem
# - /etc/letsencrypt/live/todoapi.minhhoccode111.com/privkey.pem
#
# To test SSL configuration:
# https://www.ssllabs.com/ssltest/analyze.html?d=todoapi.minhhoccode111.com
#
# To renew certificates manually:
# sudo certbot renew --force-renewal
# sudo systemctl reload nginx

upstream todoapi {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    server_name todoapi.minhhoccode111.com;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name todoapi.minhhoccode111.com;

    ssl_certificate /etc/letsencrypt/live/todoapi.minhhoccode111.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/todoapi.minhhoccode111.com/privkey.pem;

    client_max_body_size 10M;
    client_body_timeout 60s;
    keepalive_timeout 65;

    location / {
        proxy_pass http://todoapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

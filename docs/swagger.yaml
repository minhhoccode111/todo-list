basePath: /api/v1
definitions:
  entity.PriorityLevel:
    enum:
    - low
    - med
    - high
    type: string
    x-enum-varnames:
    - PriorityLevelLow
    - PriorityLevelMed
    - PriorityLevelHigh
  entity.Todo:
    properties:
      completed:
        type: boolean
      created_at:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: integer
      priority:
        $ref: '#/definitions/entity.PriorityLevel'
      title:
        type: string
      updated_at:
        type: string
    required:
    - completed
    - created_at
    - description
    - id
    - priority
    - title
    - updated_at
    type: object
  entity.Todos:
    properties:
      data:
        items:
          $ref: '#/definitions/entity.Todo'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    required:
    - data
    - limit
    - page
    - total
    type: object
  entity.Translation:
    properties:
      destination:
        example: en
        type: string
      original:
        example: текст для перевода
        type: string
      source:
        example: auto
        type: string
      translation:
        example: text for translation
        type: string
    type: object
  entity.TranslationHistory:
    properties:
      history:
        items:
          $ref: '#/definitions/entity.Translation'
        type: array
    type: object
  request.CreateTodo:
    properties:
      description:
        maxLength: 10000
        type: string
      due_date:
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/entity.PriorityLevel'
        enum:
        - low
        - med
        - high
      title:
        maxLength: 255
        type: string
    required:
    - description
    - title
    type: object
  request.Login:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 255
        type: string
    required:
    - email
    - password
    type: object
  request.Register:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      password:
        maxLength: 255
        type: string
    required:
    - email
    - name
    - password
    type: object
  request.Translate:
    properties:
      destination:
        example: en
        type: string
      original:
        example: текст для перевода
        type: string
      source:
        example: auto
        type: string
    required:
    - destination
    - original
    - source
    type: object
  request.UpdateTodo:
    properties:
      completed:
        type: boolean
      description:
        maxLength: 10000
        type: string
      due_date:
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/entity.PriorityLevel'
        enum:
        - low
        - med
        - high
      title:
        maxLength: 255
        type: string
    required:
    - description
    - title
    type: object
  response.Auth:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  response.Message:
    properties:
      message:
        type: string
    required:
    - message
    type: object
host: localhost:8080
info:
  contact: {}
  description: A Todo-List API with Gin and Clean Architecture
  title: Todo-List API
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/json
      description: Login a user with email and password
      operationId: login
      parameters:
      - description: comment
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Auth'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Message'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      summary: Login
      tags:
      - Auth
  /refresh:
    post:
      description: Refresh access token using refresh token from cookie
      operationId: refresh
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Auth'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      summary: Refresh
      tags:
      - Auth
  /register:
    post:
      consumes:
      - application/json
      description: Register a user with name, email and password
      operationId: register
      parameters:
      - description: comment
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.Register'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Auth'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Message'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      summary: Register
      tags:
      - Auth
  /todos:
    get:
      description: Get paginated list of Todo items
      operationId: get-todos
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Todos'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      security:
      - BearerAuth: []
      summary: Get Todos
      tags:
      - todo
    post:
      consumes:
      - application/json
      description: Create a Todo item with title and description
      operationId: create-todo
      parameters:
      - description: comment
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateTodo'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Todo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Message'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      security:
      - BearerAuth: []
      summary: Create Todo
      tags:
      - todo
  /todos/{id}:
    delete:
      description: Delete a Todo item
      operationId: delete-todo
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Message'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      security:
      - BearerAuth: []
      summary: Delete Todo
      tags:
      - todo
    put:
      consumes:
      - application/json
      description: Update an existing Todo item
      operationId: update-todo
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      - description: comment
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateTodo'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Todo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Message'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      security:
      - BearerAuth: []
      summary: Update Todo
      tags:
      - todo
  /translation/do-translate:
    post:
      consumes:
      - application/json
      description: Translate a text
      operationId: do-translate
      parameters:
      - description: Set up translation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.Translate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Translation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Message'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      summary: Translate
      tags:
      - translation
  /translation/history:
    get:
      consumes:
      - application/json
      description: Show all translation history
      operationId: history
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.TranslationHistory'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Message'
      summary: Show history
      tags:
      - translation
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
